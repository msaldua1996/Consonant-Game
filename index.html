<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Big Consonant Whack-a-Mole</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background: #f0f8ff; }
        .grid { display: grid; grid-template-columns: repeat(3, 100px); gap: 10px; justify-content: center; margin-top: 20px; }
        .hole { width: 100px; height: 100px; background: #8b4513; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2rem; color: white; cursor: pointer; position: relative; overflow: hidden; }
        .mole { width: 80px; height: 80px; background: #ffcc00; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; position: absolute; bottom: -100%; transition: bottom 0.2s; color: #333; }
        .mole.up { bottom: 10px; }
    </style>
</head>
<body>
    <h1>Whack the Consonant!</h1>
    <p>Score: <span id="score">0</span></p>
    <div class="grid">
        <div class="hole"><div class="mole" onclick="whack(this)"></div></div>
        <div class="hole"><div class="mole" onclick="whack(this)"></div></div>
        <div class="hole"><div class="mole" onclick="whack(this)"></div></div>
        <div class="hole"><div class="mole" onclick="whack(this)"></div></div>
        <div class="hole"><div class="mole" onclick="whack(this)"></div></div>
        <div class="hole"><div class="mole" onclick="whack(this)"></div></div>
    </div>

    <script>
        const scoreBoard = document.getElementById('score');
        const moles = document.querySelectorAll('.mole');
        const consonants = "BCDFGHJKLMNPQRSTVWXYZ";
        let score = 0;

        function randomTime(min, max) { return Math.round(Math.random() * (max - min) + min); }
        function randomMole() { const idx = Math.floor(Math.random() * moles.length); return moles[idx]; }

        function peep() {
            const time = randomTime(600, 1200);
            const mole = randomMole();
            mole.textContent = consonants[Math.floor(Math.random() * consonants.length)];
            mole.classList.add('up');
            setTimeout(() => {
                mole.classList.remove('up');
                peep();
            }, time);
        }

        function whack(e) {
            score++;
            e.classList.remove('up');
            scoreBoard.textContent = score;
        }

        peep();
    </script>
</body>
</html>
